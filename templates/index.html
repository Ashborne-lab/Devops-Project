<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen font-sans">
    
    <div class="bg-gray-800 p-10 rounded-xl shadow-2xl border border-blue-500 w-full max-w-3xl text-center">
        <h1 class="text-4xl font-extrabold text-blue-400 mb-2">DevOps Pipeline Active</h1>
        <p class="text-gray-400 mb-8 text-lg">Continuous Integration & Deployment successfully orchestrated via Jenkins.</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-gray-700 p-6 rounded-lg border-t-4 border-green-500 shadow-inner">
                <h3 class="text-sm text-gray-400 uppercase tracking-wide">System Status</h3>
                <p class="text-2xl font-bold text-green-400 mt-2">Online</p>
            </div>
            
            <div class="bg-gray-700 p-6 rounded-lg border-t-4 border-blue-500 shadow-inner">
                <h3 class="text-sm text-gray-400 uppercase tracking-wide">Build Version</h3>
                <p class="text-2xl font-bold text-blue-400 mt-2">v2.0.0</p>
            </div>
            
            <div class="bg-gray-700 p-6 rounded-lg border-t-4 border-purple-500 shadow-inner">
                <h3 class="text-sm text-gray-400 uppercase tracking-wide">Container Engine</h3>
                <p class="text-2xl font-bold text-purple-400 mt-2">Docker</p>
            </div>
        </div>

        <div class="mt-10 text-sm text-gray-500">
            <p>Engineered by Shivam Kumar</p>
        </div>
    </div>

</body>
</html>

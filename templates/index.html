<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML-Ops Sentiment Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen font-sans">
    
    <div class="bg-gray-800 p-10 rounded-xl shadow-2xl border border-blue-500 w-full max-w-2xl text-center">
        <h1 class="text-4xl font-extrabold text-blue-400 mb-2">ML-Ops Sentiment Engine</h1>
        <p class="text-gray-400 mb-8 text-sm">Deployed via Jenkins CI/CD • Running on Docker & Nginx</p>
        
        <textarea id="textInput" rows="3" class="w-full p-4 rounded bg-gray-700 text-white border border-gray-600 focus:border-blue-500 focus:outline-none mb-4" placeholder="Enter text to analyze... (e.g., 'This pipeline is amazing!')"></textarea>
        
        <button onclick="analyzeText()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg w-full transition duration-200">
            Run Inference
        </button>

        <div id="resultBox" class="hidden mt-8 p-6 rounded-lg border-t-4 bg-gray-700 shadow-inner">
            <h3 class="text-sm text-gray-400 uppercase tracking-wide">Inference Result</h3>
            <p id="sentimentOutput" class="text-3xl font-bold mt-2">-</p>
            <p id="polarityOutput" class="text-sm text-gray-400 mt-2">Confidence Score: -</p>
        </div>
    </div>

    <script>
        async function analyzeText() {
            const text = document.getElementById('textInput').value;
            if (!text) return;

            // Send data to the Flask /analyze endpoint
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            const result = await response.json();
            
            // Show the result box
            const resultBox = document.getElementById('resultBox');
            const sentimentOutput = document.getElementById('sentimentOutput');
            const polarityOutput = document.getElementById('polarityOutput');
            
            resultBox.classList.remove('hidden');
            polarityOutput.innerText = `Polarity Score: ${result.polarity}`;
            
            // Change colors based on sentiment
            if (result.sentiment === "Positive") {
                sentimentOutput.innerText = "✅ Positive";
                sentimentOutput.className = "text-3xl font-bold mt-2 text-green-400";
                resultBox.className = "mt-8 p-6 rounded-lg border-t-4 border-green-500 bg-gray-700 shadow-inner";
            } else if (result.sentiment === "Negative") {
                sentimentOutput.innerText = "❌ Negative";
                sentimentOutput.className = "text-3xl font-bold mt-2 text-red-400";
                resultBox.className = "mt-8 p-6 rounded-lg border-t-4 border-red-500 bg-gray-700 shadow-inner";
            } else {
                sentimentOutput.innerText = "➖ Neutral";
                sentimentOutput.className = "text-3xl font-bold mt-2 text-gray-300";
                resultBox.className = "mt-8 p-6 rounded-lg border-t-4 border-gray-400 bg-gray-700 shadow-inner";
            }
        }
    </script>
</body>
</html>

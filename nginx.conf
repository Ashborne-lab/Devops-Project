# ── Rate limiting zone ─────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # ── Docker DNS — resolve upstreams at request time, not startup ────────
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream http://live-python-app:5000;

    # ── Security Headers ──────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-XSS-Protection       "1; mode=block"    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self';" always;

    # ── Gzip Compression ─────────────────────────────────────────────────
    gzip              on;
    gzip_types        text/plain text/css application/json application/javascript text/xml;
    gzip_min_length   256;
    gzip_comp_level   5;

    # ── Main App Proxy ───────────────────────────────────────────────────
    location / {
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API Rate Limiting ────────────────────────────────────────────────
    location /metrics {
        limit_req          zone=api_limit burst=20 nodelay;
        proxy_pass         $upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Health Check (no rate limit) ─────────────────────────────────────
    location /health {
        proxy_pass         $upstream;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Custom Error Pages ───────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}